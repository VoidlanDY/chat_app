name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v6
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Get dependencies
        run: |
          cd client/chat_app
          flutter pub get

      - name: Build debug APK
        run: |
          cd client/chat_app
          flutter build apk --debug

      - name: Build release APK
        run: |
          cd client/chat_app
          flutter build apk --release

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: |
            client/chat_app/build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            client/chat_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
